<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MNIST 手写数字识别</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; margin-top: 50px; }
        .container { display: flex; gap: 40px; align-items: flex-start; }
        .canvas-section { display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #333; cursor: crosshair; background-color: white; }
        .controls { margin-top: 15px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        .results-section { min-width: 200px; padding: 20px; background: #f9f9f9; border-radius: 8px; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 18px; }
        .bar-container { width: 100%; background-color: #e0e0e0; border-radius: 4px; margin-top: 5px; }
        .bar { height: 10px; background-color: #4CAF50; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="canvas-section">
        <h3>请在下方手写数字 (0-9)</h3>
        <canvas id="drawingPad" width="280" height="280"></canvas>
        <div class="controls">
            <button onclick="clearCanvas()">重置画面</button>
            <button onclick="predict()">识别数字</button>
        </div>
    </div>

    <div class="results-section">
        <h3>预测结果</h3>
        <div id="resultsList">暂无预测</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('drawingPad');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.lineWidth = 20;
    ctx.lineCap = 'round';
    ctx.strokeStyle = 'black';

    canvas.addEventListener('mousedown', (e) => {
        isDrawing = true;
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
    });

    canvas.addEventListener('mousemove', (e) => {
        if (isDrawing) {
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        }
    });

    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseout', () => isDrawing = false);

    function clearCanvas() {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        document.getElementById('resultsList').innerHTML = "暂无预测";
    }

    async function predict() {
        const dataURL = canvas.toDataURL('image/png');
        
        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataURL })
            });
            const results = await response.json();
            displayResults(results);
        } catch (error) {
            console.error('Error during prediction:', error);
            alert("预测失败，请检查后端服务是否开启。");
        }
    }

    function displayResults(results) {
        const resultsDiv = document.getElementById('resultsList');
        resultsDiv.innerHTML = '';

        results.slice(0, 5).forEach(res => {
            const percentage = (res.probability * 100).toFixed(2) + '%';
            
            const itemHTML = `
                <div style="margin-bottom: 15px;">
                    <div class="result-item">
                        <strong>数字: ${res.digit}</strong>
                        <span>${percentage}</span>
                    </div>
                    <div class="bar-container">
                        <div class="bar" style="width: ${percentage};"></div>
                    </div>
                </div>
            `;
            resultsDiv.innerHTML += itemHTML;
        });
    }
</script>

</body>
</html>
